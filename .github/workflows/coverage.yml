name: Code Coverage Check

on:
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build and run tests with JaCoCo
        run: mvn verify

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Report code coverage
        if: always()
        run: |
          LINE_COUNTER=$(grep -oE '<counter type="LINE" missed="[0-9]+" covered="[0-9]+"/>' target/site/jacoco/jacoco.xml | tail -1)
          COVERED=$(echo "$LINE_COUNTER" | grep -oE 'covered="[0-9]+"' | grep -oE '[0-9]+')
          MISSED=$(echo "$LINE_COUNTER" | grep -oE 'missed="[0-9]+"' | grep -oE '[0-9]+')

          if [ -z "$COVERED" ] || [ -z "$MISSED" ]; then
            echo "Failed to parse JaCoCo report"
            exit 1
          fi

          PERCENT=$(echo "scale=2; $COVERED / ($COVERED + $MISSED) * 100" | bc)
          echo "Line coverage is $PERCENT% (required: 90%)"
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <title th:text="#{register.title}">Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div class="px-8 pt-16 lg:px-16">
    <h1 class="text-white font-bold text-5xl lg:text-3xl mb-4">connell<span class="text-[#f9004d]">boyce</span>.com</h1>
    <div class="bg-neutral-900 px-12 py-16 lg:py-8 rounded-lg w-fit">
        <h2 class="text-white text-6xl lg:text-4xl font-semibold mb-16 lg:mb-8" th:text="#{register.heading}">create a user</h2>
        <form th:action="@{/api/v1/user}" method="post" content="application/json">
            <div>
                <input type="text" name="username" th:placeholder="#{common.placeholder.username}" placeholder="Username" class="h-16 rounded-lg my-2 text-4xl lg:text-2xl"/>
            </div>
            <div>
                <input type="password" name="password" th:placeholder="#{common.placeholder.password}" placeholder="Password" class="h-16 rounded-lg my-2 text-4xl lg:text-2xl"/>
            </div>
            <div>
                <input type="email" name="email" th:placeholder="#{common.placeholder.email}" placeholder="E-Mail" class="h-16 rounded-lg my-2 text-4xl lg:text-2xl"/>
            </div>
            <div>
                <input type="text" name="firstName" th:placeholder="#{common.placeholder.firstName}" placeholder="First Name" class="h-16 rounded-lg my-2 text-4xl lg:text-2xl"/>
            </div>
            <div>
                <input type="text" name="lastName" th:placeholder="#{common.placeholder.lastName}" placeholder="Last Name" class="h-16 rounded-lg my-2 text-4xl lg:text-2xl"/>
            </div>
            <div class="error" th:if="${param.error}">
                <p class="text-red-400 text-xl lg:text-lg" th:text="#{register.error.invalidInputs}">Invalid inputs.</p>
            </div>
            <p class="text-3xl lg:text-xl text-white my-8 lg:my-4" th:inline="text">[[#{register.terms.prefix}]] <a href="#" class="underline w-full max-w-1/3" th:text="#{common.termsOfService.linkText}">connellboyce.com terms of service</a>.</p>
            <input class="bg-[#f9004d] border-4 font-bold hover:bg-black border-[#f9004d] py-2 px-4 rounded-xl text-white cursor-pointer text-5xl lg:text-3xl mt-8 lg:mt-4"
                   type="submit"
                   th:value="#{register.submit}"
                   value="Register" />
        </form>
    </div>
</div>
</body>
<script th:inline="javascript">
    document.querySelector("form").addEventListener("submit", async function (e) {
        e.preventDefault();
        const data = {
            username: this.username.value,
            password: this.password.value,
            email: this.email.value,
            firstName: this.firstName.value,
            lastName: this.lastName.value
        };

        const res = await fetch("/api/v1/user", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            alert(/*[[#{register.js.successAlert}]]*/ "Successfully created user.")
            window.location.href = "/login";
        } else {
            alert(/*[[#{register.js.failureAlert}]]*/ "User creation failed");
        }
    });
</script>
</html>
